<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Cats vs Dogs Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 760px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
        }
        .card {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 24px;
            margin-top: 20px;
        }
        input, button {
            margin-top: 12px;
            font-size: 16px;
        }
        button {
            padding: 10px 18px;
            cursor: pointer;
        }
        #preview {
            max-width: 360px;
            margin-top: 16px;
            display: none;
            border-radius: 8px;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        .muted {
            color: #666;
            font-size: 14px;
        }
        pre {
            background: #f5f5f5;
            padding: 12px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🐱 Cats vs Dogs Classifier 🐶</h1>

    <p class="muted">
        Model URI: {{ model_uri }}<br>
        Threshold: {{ threshold }}
    </p>

    <div class="card">
        <h2>Upload ảnh</h2>
        <input id="fileInput" type="file" accept="image/png,image/jpeg">
        <br>
        <img id="preview">
        <br>
        <button onclick="predict()">Dự đoán</button>

        <div id="result"></div>
        <pre id="jsonResult"></pre>
    </div>

    <div class="card">
        <h2>Monitoring nhanh</h2>
        <button onclick="loadMonitoring()">Xem monitoring</button>
        <pre id="monitoringResult"></pre>
    </div>

    <script>
        const fileInput = document.getElementById("fileInput");
        const preview = document.getElementById("preview");

        fileInput.addEventListener("change", () => {
            const file = fileInput.files[0];
            if (!file) return;

            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
        });

        async function predict() {
            const file = fileInput.files[0];
            if (!file) {
                alert("Hãy chọn một ảnh trước.");
                return;
            }

            const formData = new FormData();
            formData.append("file", file);

            document.getElementById("result").innerText = "Đang dự đoán...";
            document.getElementById("jsonResult").innerText = "";

            const response = await fetch("/predict", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            if (!response.ok) {
                document.getElementById("result").innerText = "Lỗi: " + data.detail;
                return;
            }

            document.getElementById("result").innerText =
                `Kết quả: ${data.prediction.toUpperCase()} | Confidence: ${(data.confidence * 100).toFixed(2)}%`;

            document.getElementById("jsonResult").innerText =
                JSON.stringify(data, null, 2);
        }

        async function loadMonitoring() {
            const response = await fetch("/monitoring");
            const data = await response.json();
            document.getElementById("monitoringResult").innerText =
                JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
